name: Update latest research

on:
  schedule:
    # 06:00 UTC on the 1st and 15th of each month (~every two weeks)
    - cron: '0 6 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-articles
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest articles from Europe PMC
        run: node scripts/fetch-articles.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- articles.json; then
            echo "No changes to articles.json."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles.json
          git commit -m "Update latest research articles (auto, biweekly)"
          git push
