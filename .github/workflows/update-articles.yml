name: Update latest research

on:
  schedule:
    # 06:00 UTC on the 1st and 15th of each month (~every two weeks)
    - cron: '0 6 1,15 * *'
  workflow_dispatch:

# Needs contents:write to commit articles.json, and pages/id-token to deploy.
permissions:
  contents: write
  pages: write
  id-token: write

# Share the "pages" group with deploy.yml so the two never deploy concurrently.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest articles from Europe PMC
        run: node scripts/fetch-articles.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- articles.json; then
            echo "No changes to articles.json."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add articles.json
            git commit -m "Update latest research articles (auto, biweekly)"
            git push
          fi

      # Pushes made with GITHUB_TOKEN don't trigger deploy.yml, so publish the
      # updated site (including the new articles.json) directly here.
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
